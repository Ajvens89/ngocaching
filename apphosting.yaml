# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Mapbox public token — stored in Firebase Secret Manager
  # Aby ustawić: firebase apphosting:secrets:set NEXT_PUBLIC_MAPBOX_TOKEN
  - variable: NEXT_PUBLIC_MAPBOX_TOKEN
    secret: NEXT_PUBLIC_MAPBOX_TOKEN
    availability:
      - BUILD
      - RUNTIME
